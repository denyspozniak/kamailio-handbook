name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install MkDocs and plugins
        run: pip install -r requirements.txt

      - name: Stage per-language index pages
        run: |
          cp docs/en/README.md docs/en/index.md
          cp docs/uk/README.md docs/uk/index.md

          # Set the page title via YAML frontmatter — mkdocs can't extract it
          # from the source <h1 align="center"> (that's raw HTML, not markdown).
          # Without this, mkdocs falls back to the filename and labels both the
          # nav entry and the in-page ToC header as "Index".
          # Also pin edit_url to the real README.md so the site's pencil icon
          # doesn't 404 (index.md is a CI artifact, not committed).
          sed -i '1i---\ntitle: Kamailio Handbook — English\nedit_url: https://github.com/denyspozniak/kamailio-handbook/edit/main/docs/en/README.md\n---\n' docs/en/index.md
          sed -i '1i---\ntitle: Kamailio Handbook — Українська\nedit_url: https://github.com/denyspozniak/kamailio-handbook/edit/main/docs/uk/README.md\n---\n' docs/uk/index.md

          # Rewrite the in-README language-switcher path for the mkdocs site:
          # default locale is served at /kamailio-handbook/, the other at /kamailio-handbook/<lang>/.
          # The relative paths that work on GitHub (../uk/, ../en/) don't resolve correctly there.
          sed -i -e 's|href="\.\./uk/"|href="uk/"|g' \
                 -e 's|href="\.\./uk/README\.md"|href="uk/"|g'  docs/en/index.md
          sed -i -e 's|href="\.\./en/"|href="../"|g' \
                 -e 's|href="\.\./en/README\.md"|href="../"|g'  docs/uk/index.md

      - name: Build site
        run: mkdocs build --strict

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
